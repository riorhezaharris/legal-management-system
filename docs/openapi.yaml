      tags:
        - Admin — SLA & Holidays
      responses:
        "200":
          description: SLA config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlaConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - bearerAuth: []

    post:
      operationId: updateSlaConfig
      summary: Update SLA working days
      tags:
        - Admin — SLA & Holidays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workingDays]
              properties:
                workingDays:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Updated SLA config
          content:
