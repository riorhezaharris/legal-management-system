        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHolidayRequest"
      responses:
        "201":
          description: Holiday created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - bearerAuth: []

  /admin/holidays/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"

    delete:
      operationId: deleteHoliday
      summary: Delete a holiday
      tags:
        - Admin — SLA & Holidays
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: []

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # Enums
    Role:
      type: string
      enum: [IT_ADMIN, REQUESTOR, LEGAL_TEAM, VENDOR]

    KybStatus:
      type: string
      enum: [INVITED, SUBMITTED, REVISION, APPROVED]

    VendorType:
      type: string
      enum: [BADAN, PERORANGAN]

    RequestType:
      type: string
      enum: [PERJANJIAN_BARU, ADENDUM, SURAT, PERMINTAAN_DOKUMEN]

    RequestStatus:
      type: string
      enum:
        - DRAFT
        - WAITING
        - LEGAL_REVIEW
        - USER_REVIEW
        - VENDOR_REVIEW
        - INTERNAL_SIGNING
        - VENDOR_SIGNING
        - FINISHED
        - CANCELLED
        - REJECTED

    StatusPerjanjian:
      type: string
      enum: [BELUM_BERLANGSUNG, SEDANG_BERLANGSUNG, SUDAH_SELESAI]

    HolidayType:
      type: string
      enum: [NATIONAL, CUSTOM]

    KybDocumentType:
      type: string
      enum:
        - AKTA_PENDIRIAN
        - SK_PENDIRIAN
        - NIB
        - KTP_PENANGGUNG_JAWAB
        - NPWP_BADAN
        - AKTA_PERUBAHAN_DIREKSI
        - SK_PERUBAHAN_DIREKSI
        - SURAT_KUASA
        - KTP
        - NPWP

    AttachmentType:
      type: string
      enum:
        - ADENDUM_PREVIOUS_AGREEMENT
        - SURAT_PRIOR_CORRESPONDENCE
        - PERMINTAAN_SUPPORTING_DOC

    TransitionAction:
      type: string
      enum:
        - ADVANCE
        - SEND_BACK
        - CANCEL
        - REJECT
        - CONFIRM_VENDOR
        - MARK_INTERNAL_SIGNING_REQUIRED

    # Entities
    User:
      type: object
      required: [id, supabaseId, email, name, role, isActive, profileCompleted, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        supabaseId:
          type: string
          readOnly: true
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        isActive:
          type: boolean
        profileCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    RequestorProfile:
      type: object
      required: [id, userId, namaLengkap, lokasiKantorId, divisiId, unitBisnisId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        userId:
          type: string
          format: uuid
        namaLengkap:
          type: string
        lokasiKantorId:
          type: string
          format: uuid
        divisiId:
          type: string
          format: uuid
        unitBisnisId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    Vendor:
      type: object
      required: [id, email, name, kybStatus, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        supabaseId:
          type: string
          nullable: true
        email:
          type: string
          format: email
        name:
          type: string
        address:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/VendorType"
          nullable: true
        kybStatus:
          $ref: "#/components/schemas/KybStatus"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    KybDocument:
      type: object
      required: [id, vendorId, documentType, fileUrl, fileName, fileSize, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        vendorId:
          type: string
          format: uuid
        documentType:
          $ref: "#/components/schemas/KybDocumentType"
        fileUrl:
          type: string
          format: uri
        fileName:
          type: string
        fileSize:
          type: integer
          description: File size in bytes
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    KybReview:
      type: object
      required: [id, vendorId, remarks, createdById, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        vendorId:
          type: string
          format: uuid
        remarks:
          type: string
        createdById:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          readOnly: true

    VendorKyb:
      type: object
      description: Vendor with KYB documents and review history
      allOf:
        - $ref: "#/components/schemas/Vendor"
        - type: object
          properties:
            kybDocuments:
              type: array
              items:
                $ref: "#/components/schemas/KybDocument"
            kybReviews:
              type: array
              items:
                $ref: "#/components/schemas/KybReview"

    LegalRequestData:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        requestId:
          type: string
          format: uuid
        lingkupPerjanjian:
          type: string
          nullable: true
        statusPerjanjian:
          $ref: "#/components/schemas/StatusPerjanjian"
          nullable: true
        jangkaWaktuStart:
          type: string
          format: date-time
          nullable: true
        jangkaWaktuEnd:
          type: string
          format: date-time
          nullable: true
        perjanjianSebelumnya:
          type: string
          nullable: true
        halYangInginDiubah:
          type: string
          nullable: true
        suratYangHendakDibuat:
          type: string
          nullable: true
        identitasPenerimaSurat:
          type: string
          nullable: true
        dokumenYangDiminta:
          type: string
          nullable: true
        tujuanPermintaan:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    LegalRequestAttachment:
      type: object
      required: [id, requestId, type, fileUrl, fileName, fileSize, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        requestId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/AttachmentType"
        fileUrl:
          type: string
          format: uri
        fileName:
          type: string
        fileSize:
          type: integer
          description: File size in bytes
        createdAt:
          type: string
          format: date-time
          readOnly: true

    FinalDocument:
      type: object
      required: [id, requestId, fileUrl, fileName, fileSize, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        requestId:
          type: string
          format: uuid
        fileUrl:
          type: string
          format: uri
        fileName:
          type: string
        fileSize:
          type: integer
          description: File size in bytes
        createdAt:
          type: string
          format: date-time
          readOnly: true

    StageHistory:
      type: object
      required: [id, requestId, toStage, actorId, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        requestId:
          type: string
          format: uuid
        fromStage:
          $ref: "#/components/schemas/RequestStatus"
          nullable: true
        toStage:
          $ref: "#/components/schemas/RequestStatus"
        actorId:
          type: string
          format: uuid
        remarks:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          readOnly: true

    LegalRequest:
      type: object
      required: [id, requestorId, type, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        requestorId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/RequestType"
        status:
          $ref: "#/components/schemas/RequestStatus"
        referenceNumber:
          type: string
          nullable: true
          description: Auto-assigned on submission
        vendorId:
          type: string
          format: uuid
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        slaDeadline:
          type: string
          format: date-time
          nullable: true
        requiresInternalSigning:
          type: boolean
        rejectionReason:
          type: string
          nullable: true
        firstHandlerId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        data:
          $ref: "#/components/schemas/LegalRequestData"
          nullable: true
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/LegalRequestAttachment"
        finalDocuments:
          type: array
          items:
            $ref: "#/components/schemas/FinalDocument"
        stageHistories:
          type: array
          items:
            $ref: "#/components/schemas/StageHistory"
        vendor:
          $ref: "#/components/schemas/Vendor"
          nullable: true
        requestor:
          $ref: "#/components/schemas/User"

    LokasiKantor:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    Divisi:
      type: object
      required: [id, name, code, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        code:
          type: string
          pattern: "^[A-Z0-9]{1,5}$"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    UnitBisnis:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    SlaConfig:
      type: object
      required: [id, workingDays, updatedAt]
      properties:
        id:
          type: string
          readOnly: true
          description: Always "singleton"
        workingDays:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    Holiday:
      type: object
      required: [id, date, description, type, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        date:
          type: string
          format: date
        description:
          type: string
        type:
          $ref: "#/components/schemas/HolidayType"
        createdAt:
          type: string
          format: date-time
          readOnly: true

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # Request bodies
    CreateUserRequest:
      type: object
      required: [email, name, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [REQUESTOR, LEGAL_TEAM]

    CompleteProfileRequest:
      type: object
      required: [namaLengkap, lokasiKantorId, divisiId, unitBisnisId]
      properties:
        namaLengkap:
          type: string
        lokasiKantorId:
          type: string
          format: uuid
        divisiId:
          type: string
          format: uuid
        unitBisnisId:
          type: string
          format: uuid

    UpdateProfileRequest:
      type: object
      minProperties: 1
      properties:
        namaLengkap:
          type: string
        lokasiKantorId:
          type: string
          format: uuid
        divisiId:
          type: string
          format: uuid
        unitBisnisId:
          type: string
          format: uuid

    KybDocumentUpload:
      type: object
      properties:
        AKTA_PENDIRIAN:
          type: string
          format: binary
        SK_PENDIRIAN:
          type: string
          format: binary
        NIB:
          type: string
          format: binary
        KTP_PENANGGUNG_JAWAB:
          type: string
          format: binary
        NPWP_BADAN:
          type: string
          format: binary
        AKTA_PERUBAHAN_DIREKSI:
          type: string
          format: binary
        SK_PERUBAHAN_DIREKSI:
          type: string
          format: binary
        SURAT_KUASA:
          type: string
          format: binary
        KTP:
          type: string
          format: binary
        NPWP:
          type: string
          format: binary

    CreateRequestBody:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/RequestType"
        submit:
          type: boolean
          default: false
          description: Set true to submit immediately; false saves as DRAFT
        vendorId:
          type: string
          format: uuid
        lingkupPerjanjian:
          type: string
        statusPerjanjian:
          $ref: "#/components/schemas/StatusPerjanjian"
        jangkaWaktuStart:
          type: string
          format: date
        jangkaWaktuEnd:
          type: string
          format: date
        perjanjianSebelumnya:
          type: string
        halYangInginDiubah:
          type: string
        suratYangHendakDibuat:
          type: string
        identitasPenerimaSurat:
          type: string
        dokumenYangDiminta:
          type: string
        tujuanPermintaan:
          type: string
        ADENDUM_PREVIOUS_AGREEMENT:
          type: string
          format: binary
        SURAT_PRIOR_CORRESPONDENCE:
          type: string
          format: binary
        PERMINTAAN_SUPPORTING_DOC:
          type: string
          format: binary

    UpdateRequestBody:
      type: object
      description: Same fields as CreateRequestBody minus `type`; only allowed in DRAFT status.
      properties:
        vendorId:
          type: string
          format: uuid
        lingkupPerjanjian:
          type: string
        statusPerjanjian:
          $ref: "#/components/schemas/StatusPerjanjian"
        jangkaWaktuStart:
          type: string
          format: date
        jangkaWaktuEnd:
          type: string
          format: date
        perjanjianSebelumnya:
          type: string
        halYangInginDiubah:
          type: string
        suratYangHendakDibuat:
          type: string
        identitasPenerimaSurat:
          type: string
        dokumenYangDiminta:
          type: string
        tujuanPermintaan:
          type: string
        ADENDUM_PREVIOUS_AGREEMENT:
          type: string
          format: binary
        SURAT_PRIOR_CORRESPONDENCE:
          type: string
          format: binary
        PERMINTAAN_SUPPORTING_DOC:
          type: string
          format: binary

    TransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          $ref: "#/components/schemas/TransitionAction"
        remarks:
          type: string
          description: Optional notes for SEND_BACK or REJECT actions
        reason:
          type: string
          description: Rejection reason for REJECT action

    CreateHolidayRequest:
      type: object
      required: [date, description, type]
      properties:
        date:
          type: string
          format: date
          description: ISO 8601 date (YYYY-MM-DD)
        description:
          type: string
        type:
          $ref: "#/components/schemas/HolidayType"

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource UUID
      schema:
        type: string
        format: uuid

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Validation error or invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Invalid request parameters"

    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Unauthorized"

    Forbidden:
      description: Authenticated but insufficient permissions or account deactivated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Forbidden"

    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Not found"

    Conflict:
      description: Unique constraint violation (duplicate email, code, date, etc.)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Email already exists"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Internal server error"

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase-issued JWT. Pass as `Authorization: Bearer <token>`.

security:
  - bearerAuth: []
